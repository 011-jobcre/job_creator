{% extends "base.html" %}
{% load static i18n %}
{% block title %}
    {% trans "グループ" %} | JOB CREATOR
{% endblock title %}
{% block content %}
    <!-- Hero -->
    <section class="pt-24 md:pt-30 pb-6 md:pb-10 overflow-hidden border-b border-border">
        <div class="content__pad-x text-center" data-aos="flip-left">
            <h1 class="hero-title">{% trans "グループ" %}</h1>
        </div>
    </section>
    <!-- Main Content -->
    <section class="container content__pad-x content__pad-y space-y-32 overflow-hidden">
        <section>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="minimal-card bg-surface shadow-sm"
                     data-aos="fade-up"
                     data-aos-delay="100">
                    <h3 class="text-2xl font-bold tracking-wide mb-2">Creator Holdings</h3>
                </div>
                <div class="minimal-card bg-surface shadow-sm"
                     data-aos="fade-up"
                     data-aos-delay="200">
                    <h3 class="text-2xl font-bold tracking-wide mb-2 uppercase">Job Creator</h3>
                </div>
                <div class="minimal-card bg-surface shadow-sm"
                     data-aos="fade-up"
                     data-aos-delay="300">
                    <h3 class="text-2xl font-bold tracking-wide mb-2">e-tac</h3>
                </div>
                <div class="minimal-card bg-surface shadow-sm"
                     data-aos="fade-up"
                     data-aos-delay="400">
                    <h3 class="text-2xl font-bold tracking-wide mb-2">Food Creators</h3>
                </div>
            </div>
        </section>
    </section>
{% endblock content %}
